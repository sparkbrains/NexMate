<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextMate</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <div class="app-bg"></div>
  <div class="app-shell">
    <aside class="threads-panel">
      <div class="panel-top">
        <h1>NextMate</h1>
        <button id="new-thread-btn" class="ghost-btn">New Thread</button>
      </div>
      <div id="thread-list" class="thread-list"></div>
    </aside>

    <main class="chat-panel">
      <header class="chat-header">
        <div>
          <p class="eyebrow">Thread</p>
          <h2 id="thread-title">Loading…</h2>
        </div>
        <div class="chat-header-actions">
          <button id="delete-thread-btn" class="danger-ghost-btn" type="button">Delete</button>
          <div id="status-pill" class="status-pill">Disconnected</div>
        </div>
      </header>

      <section id="message-list" class="message-list"></section>

      <form id="chat-form" class="composer">
        <textarea id="chat-input" rows="1" placeholder="Share how your day felt..."></textarea>
        <button id="send-btn" type="submit">Send</button>
      </form>
    </main>
  </div>

  <script src="/assets/app.js" defer></script>
</body>
</html>
