<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Nextmate — reflection workspace</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; height: 100%; background: #14121a; }
  #root { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components/shell.jsx"></script>
<script type="text/babel" src="components/today.jsx"></script>
<script type="text/babel" src="components/chat.jsx"></script>
<script type="text/babel" src="components/loops.jsx"></script>
<script type="text/babel" src="components/data.jsx"></script>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "palette": "rust",
  "density": "comfortable"
}/*EDITMODE-END*/;

const PALETTES = {
  "rust": {
    '--paper':'#f2ede3','--paper-2':'#e8e1d2','--paper-3':'#ddd3bf',
    '--surface':'#fbf8f2','--surface-2':'#f6f1e5',
    '--ink':'#1c1a24','--ink-2':'#3a3644','--ink-3':'#6b6675','--ink-4':'#9a94a4',
    '--accent':'#c14a2b','--accent-2':'#7a1e0a','--accent-soft':'#f0cfc1','--accent-wash':'#fae5db',
    '--teal':'#1f4f4a','--teal-soft':'#cfdcd9','--rule':'#d4cdbb','--rule-soft':'#e3dbc8',
  },
  "forest": {
    '--paper':'#eef0ea','--paper-2':'#e2e6dc','--paper-3':'#d5ddce',
    '--surface':'#f7f8f3','--surface-2':'#edf0e6',
    '--ink':'#141a17','--ink-2':'#2f3830','--ink-3':'#5b655d','--ink-4':'#8a948c',
    '--accent':'#2d5f3f','--accent-2':'#173a25','--accent-soft':'#c8d7cc','--accent-wash':'#deebe2',
    '--teal':'#7c5a28','--teal-soft':'#e4d6ba','--rule':'#ccd3c4','--rule-soft':'#dde1d2',
  },
  "dusk": {
    '--paper':'#1a1723','--paper-2':'#232030','--paper-3':'#2d2938',
    '--surface':'#14111d','--surface-2':'#1e1a2a',
    '--ink':'#ece7dd','--ink-2':'#c5bfb2','--ink-3':'#8f8878','--ink-4':'#6b6558',
    '--accent':'#e08060','--accent-2':'#b85a3c','--accent-soft':'#3d2a24','--accent-wash':'#2a1f1a',
    '--teal':'#6ba89b','--teal-soft':'#2a3d3a','--rule':'#3a3344','--rule-soft':'#2a2534',
  },
  "bone": {
    '--paper':'#f5f3ee','--paper-2':'#ebe8e0','--paper-3':'#ddd8cc',
    '--surface':'#fafaf6','--surface-2':'#f1efe8',
    '--ink':'#0a0a0c','--ink-2':'#28272a','--ink-3':'#58565c','--ink-4':'#908e94',
    '--accent':'#8b2814','--accent-2':'#4a1508','--accent-soft':'#e8ccc4','--accent-wash':'#f2dcd4',
    '--teal':'#2a4a48','--teal-soft':'#d0d8d6','--rule':'#cec9bd','--rule-soft':'#dfdacc',
  },
};

function applyPalette(key) {
  const p = PALETTES[key] || PALETTES.rust;
  for (const k in p) document.documentElement.style.setProperty(k, p[k]);
}

function NextmateApp({ defaultRoute = 'today' }) {
  const [route, setRoute] = React.useState(defaultRoute);
  const Screen = ({ today: TodayScreen, chat: ChatScreen, loops: LoopsScreen, insights: InsightsScreen, weekly: WeeklyScreen })[route] || TodayScreen;
  return (
    <div className="nm-app" data-screen-label={"Nextmate — " + route}>
      <Sidebar active={route} onNav={setRoute} />
      <Screen onNav={setRoute} />
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAKS);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  React.useEffect(() => { applyPalette(tweaks.palette); }, [tweaks.palette]);

  React.useEffect(() => {
    const h = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  const setTweak = (k, v) => {
    setTweaks(t => ({ ...t, [k]: v }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  const { DesignCanvas, DCSection, DCArtboard } = window;

  return (
    <>
      <DesignCanvas title="Nextmate" subtitle="Reflection workspace · loop detection · web dashboard">
        <DCSection id="flow" title="Core flow" subtitle="A thread-based workspace, not a journal. Loop detection is the spine.">
          <DCArtboard id="today" label="01 · Today" width={1320} height={900}>
            <NextmateApp defaultRoute="today" />
          </DCArtboard>
          <DCArtboard id="chat" label="02 · Reflection thread" width={1320} height={900}>
            <NextmateApp defaultRoute="chat" />
          </DCArtboard>
          <DCArtboard id="loops" label="03 · Loops" width={1320} height={900}>
            <NextmateApp defaultRoute="loops" />
          </DCArtboard>
        </DCSection>

        <DCSection id="patterns" title="Patterns & report" subtitle="Where the data surfaces.">
          <DCArtboard id="insights" label="04 · Insights" width={1320} height={900}>
            <NextmateApp defaultRoute="insights" />
          </DCArtboard>
          <DCArtboard id="weekly" label="05 · Weekly report" width={1320} height={900}>
            <NextmateApp defaultRoute="weekly" />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      {tweaksOpen && (
        <div style={{ position: 'fixed', right: 20, bottom: 20, zIndex: 9999, width: 260, background: '#1c1a24', color: '#f2ede3', borderRadius: 8, padding: 16, fontFamily: 'Inter, sans-serif', fontSize: 12, border: '1px solid #3a3644', boxShadow: '0 20px 60px rgba(0,0,0,0.5)' }}>
          <div style={{ fontFamily: 'Source Serif 4, serif', fontSize: 16, marginBottom: 14 }}>Tweaks</div>
          <div style={{ fontFamily: 'JetBrains Mono', fontSize: 9.5, letterSpacing: '0.14em', textTransform: 'uppercase', color: '#9a94a4', marginBottom: 8 }}>Palette</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
            {Object.keys(PALETTES).map(k => (
              <button key={k} onClick={() => setTweak('palette', k)} style={{ padding: 8, borderRadius: 3, cursor: 'pointer', textAlign: 'left', background: tweaks.palette === k ? '#c14a2b' : '#28242f', color: '#f2ede3', border: '1px solid ' + (tweaks.palette === k ? '#c14a2b' : '#3a3644'), fontSize: 11, display: 'flex', gap: 6, alignItems: 'center' }}>
                <span style={{ display: 'inline-flex' }}>
                  {['--paper','--ink','--accent'].map(c => <span key={c} style={{ width: 9, height: 9, background: PALETTES[k][c], borderRadius: 1, marginRight: 1, border: '1px solid rgba(255,255,255,0.1)' }} />)}
                </span>
                {k}
              </button>
            ))}
          </div>
          <div style={{ marginTop: 12, fontSize: 10, color: '#9a94a4', lineHeight: 1.5 }}>
            Palette swaps apply live across all screens. Rust is the house direction; try Dusk for the dark variant.
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
